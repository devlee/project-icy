name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Studio
        run: pnpm build

      - name: Test (with coverage)
        run: pnpm test:coverage

      # Fail if schema.ts changed without regenerating committed migrations.
      - name: Check migration drift
        run: |
          pnpm db:generate
          git diff --exit-code -- packages/core/drizzle \
            || (echo "::error::Schema changed but migrations not regenerated. Run 'pnpm db:generate' and commit." && exit 1)
